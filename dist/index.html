<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Boids</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
    }
    /* settings panel positioning and transitions */
    #settings-panel {
      position: fixed;
      bottom: 10px;
      left: 10px;
      width: 300px;
      z-index: 20;
      transition: transform 0.3s ease, opacity 0.3s ease;
      max-height: calc(100vh - 20px);
      overflow-y: auto;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-CDQiRrV4.js"></script>
</head>

<body>
  <div id="canvas-container" style="width:100vw; height:100vh; position:fixed; top:0; left:0; z-index:0;"></div>

  <!-- Settings panel -->
  <div id="settings-panel" class="card">
    <div class="card-header d-flex align-items-center">
      <span class="me-auto">Settings</span>
      <div class="d-flex gap-2 justify-content-end">
        <button id="start-pause-btn" class="btn btn-sm btn-success"><i id="start-icon" class="bi bi-play-fill"></i></button>
        <button id="restart-btn" class="btn btn-sm btn-secondary"><i class="bi bi-arrow-repeat"></i></button>
        <button id="reset-btn" class="btn btn-sm btn-info"><i class="bi bi-arrow-counterclockwise"></i></button>
        <button id="toggle-panel" class="btn btn-sm btn-outline-secondary">&minus;</button>
      </div>
    </div>
    <div id="settings-body" class="card-body collapse show" style="padding: 0.75rem;">
      <!-- Simulation -->
      <div class="row g-2 mb-1">
        <label for="boid-count" class="col-6 col-form-label" style="font-size: 0.875rem;">Boid Count</label>
        <div class="col-6"><input type="number" id="boid-count" class="form-control form-control-sm" min="100" max="500000" step="100" value="15000"></div>
      </div>
      <div class="row g-2 mb-1">
        <label for="boid-density" class="col-6 col-form-label" style="font-size: 0.875rem;">Density</label>
        <div class="col-6"><input type="number" id="boid-density" class="form-control form-control-sm" min="0.00001" max="0.0001" step="0.000001" value="0.000050"></div>
      </div>

      <hr class="my-1">

      <!-- Shared params -->
      <div class="row g-2 mb-1">
        <label for="max_speed" class="col-6 col-form-label" style="font-size: 0.875rem;">Max Speed</label>
        <div class="col-6"><input type="number" id="max_speed" class="form-control form-control-sm" step="0.1" value="5"></div>
      </div>
      <div class="row g-2 mb-1">
        <label for="max_force" class="col-6 col-form-label" style="font-size: 0.875rem;">Max Force</label>
        <div class="col-6"><input type="number" id="max_force" class="form-control form-control-sm" step="0.01" value="0.1"></div>
      </div>
      <div class="row g-2 mb-1">
        <label for="margin" class="col-6 col-form-label" style="font-size: 0.875rem;">Wall Margin</label>
        <div class="col-6"><input type="number" id="margin" class="form-control form-control-sm" step="1" value="100"></div>
      </div>
      <div class="row g-2 mb-1">
        <label for="turn_factor" class="col-6 col-form-label" style="font-size: 0.875rem;">Turn Factor</label>
        <div class="col-6"><input type="number" id="turn_factor" class="form-control form-control-sm" step="0.01" value="0.2"></div>
      </div>
      <div class="row g-2 mb-1">
        <label for="separation" class="col-6 col-form-label" style="font-size: 0.875rem;">Sep. Distance</label>
        <div class="col-6"><input type="number" id="separation" class="form-control form-control-sm" step="0.1" value="25"></div>
      </div>
      <div class="row g-2 mb-1">
        <label for="sep_weight" class="col-6 col-form-label" style="font-size: 0.875rem;">Sep. Weight</label>
        <div class="col-6"><input type="number" id="sep_weight" class="form-control form-control-sm" step="0.1" value="1.5"></div>
      </div>

      <!-- Boids params -->
      <hr class="my-1">
      <div class="row g-2 mb-1">
        <label for="align" class="col-6 col-form-label" style="font-size: 0.875rem;">Align Distance</label>
        <div class="col-6"><input type="number" id="align" class="form-control form-control-sm" step="0.1" value="50"></div>
      </div>
      <div class="row g-2 mb-1">
        <label for="cohesion" class="col-6 col-form-label" style="font-size: 0.875rem;">Cohesion Dist.</label>
        <div class="col-6"><input type="number" id="cohesion" class="form-control form-control-sm" step="0.1" value="50"></div>
      </div>
      <div class="row g-2 mb-1">
        <label for="align_weight" class="col-6 col-form-label" style="font-size: 0.875rem;">Align Weight</label>
        <div class="col-6"><input type="number" id="align_weight" class="form-control form-control-sm" step="0.1" value="1.0"></div>
      </div>
      <div class="row g-2 mb-1">
        <label for="coh_weight" class="col-6 col-form-label" style="font-size: 0.875rem;">Coh. Weight</label>
        <div class="col-6"><input type="number" id="coh_weight" class="form-control form-control-sm" step="0.1" value="0.5"></div>
      </div>
    </div>
  </div>

  <!-- Info display -->
  <div
    style="position:fixed; top:10px; left:10px; z-index:10; color:#0f0; background:rgba(0,0,0,0.7); padding:10px; border-radius:8px; font-family:monospace; font-size:16px;">
    <div id="info-app">Initializing...</div>
    <div id="info-fps">FPS:</div>
    <div id="info-boids">Boids:</div>
    <div id="info-step">Sim:</div>
    <div id="info-gpu">Render:</div>
    <div id="gpu-status">GPU Status</div>
  </div>
  <!-- Bootstrap JS (with Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-" crossorigin="anonymous"></script>
</body>

</html>
